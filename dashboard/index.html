<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Dashboard · Adrienne's Hub</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* ── Forecast gauge ───────────────── */
    .forecast-gauge {
      position: relative;
      margin: 8px 0 16px;
    }

    .forecast-track {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: visible;
      position: relative;
    }

    .forecast-fill {
      height: 100%;
      border-radius: 99px;
      position: absolute;
      top: 0;
      left: 0;
      transition: width 0.5s ease;
    }

    .forecast-commit  { background: var(--green); }
    .forecast-best    { background: var(--yellow); opacity: 0.6; }
    .forecast-quota-mark {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 16px;
      background: var(--text-muted);
      border-radius: 2px;
    }

    /* ── Pipeline Kanban ──────────────── */
    .kanban {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      overflow-x: auto;
    }

    .kanban-col {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 12px;
      min-width: 180px;
    }

    .kanban-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .kanban-col-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .kanban-col-count {
      font-size: 11px;
      background: var(--border);
      color: var(--text-muted);
      padding: 1px 7px;
      border-radius: 99px;
    }

    .kanban-deal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .kanban-deal:hover { border-color: var(--accent); }

    .kanban-deal .deal-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .kanban-deal .deal-amount {
      font-size: 14px;
      color: var(--green);
      font-weight: 700;
    }

    .kanban-deal .deal-close {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .kanban-deal .deal-fc {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 99px;
      margin-top: 4px;
    }

    /* ── Left-to-close box ────────────── */
    .ltc-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(139,92,246,0.1) 100%);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: var(--radius);
      padding: 20px;
    }

    .ltc-number {
      font-size: 48px;
      font-weight: 800;
      color: var(--accent-hover);
      line-height: 1;
    }

    .ltc-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Hot deals ────────────────────── */
    .hot-deal-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(51,65,85,0.4);
    }

    .hot-deal-row:last-child { border-bottom: none; }

    .hot-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .hot-deal-name { font-size: 14px; font-weight: 600; flex: 1; }
    .hot-deal-amount { font-size: 14px; color: var(--green); font-weight: 700; }
    .hot-deal-close { font-size: 12px; color: var(--text-dim); }

    /* ── Activity heatmap ─────────────── */
    .week-activity {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .day-cell .day-name { color: var(--text-dim); }
    .day-cell .day-count { font-weight: 700; font-size: 16px; margin-top: 2px; }
    .day-cell.active { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); }
    .day-cell.today { border: 2px solid var(--accent); }

    /* ── Territory snapshot ───────────── */
    .territory-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(51,65,85,0.4);
      font-size: 14px;
    }

    .territory-row:last-child { border-bottom: none; }

    .territory-label { flex: 1; color: var(--text-muted); }
    .territory-value { font-weight: 600; }

    /* ── Quota ring ───────────────────── */
    .quota-ring-wrap {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .ring-svg { flex-shrink: 0; }

    .quota-legend { flex: 1; }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label { color: var(--text-muted); flex: 1; }
    .legend-val { font-weight: 700; font-size: 14px; }
  </style>
</head>
<body>

<header class="hub-header">
  <div class="breadcrumb">
    <a href="../index.html">← Hub</a>
    <span class="sep">/</span>
    <span>Sales Dashboard 📊</span>
  </div>
  <div class="page-title">Sales Dashboard</div>
  <div class="header-right">
    <button class="btn-icon" onclick="window.open(HUB_CONFIG.sfUrl, '_blank')">Open Salesforce ↗</button>
    <button class="btn-icon" onclick="logout()">Sign out</button>
  </div>
</header>

<main class="hub-main">

  <!-- ── Stat tiles ──────────────────── -->
  <div class="stat-grid" id="statGrid"></div>

  <!-- ── Row 1: Forecast + Left-to-Close ── -->
  <div class="grid-2 section">
    <!-- Forecast -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">My Forecast · FY26</span>
        <span id="quarterLabel" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div id="forecastContent"></div>
    </div>

    <!-- Left to Close -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Left to Close</span>
        <span style="font-size:12px;color:var(--text-dim)" id="ltcQuarter"></span>
      </div>
      <div id="ltcContent"></div>
    </div>
  </div>

  <!-- ── Pipeline Kanban ─────────────── -->
  <div class="section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Pipeline Board</span>
        <div style="display:flex;gap:8px">
          <span id="pipelineTotalBadge" style="font-size:13px;color:var(--text-muted)"></span>
          <a href="../deal-review/index.html" class="btn btn-ghost" style="padding:4px 12px;font-size:12px">Manage Deals →</a>
        </div>
      </div>
      <div class="kanban" id="kanbanBoard"></div>
    </div>
  </div>

  <!-- ── Row 2: Hot Deals + Territory Snapshot ── -->
  <div class="grid-2 section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Hot Deals 🔥</span>
        <span style="font-size:12px;color:var(--text-dim)">Closes within 90 days</span>
      </div>
      <div id="hotDeals"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Territory Snapshot</span>
      </div>
      <div id="territorySnapshot"></div>
    </div>
  </div>

  <!-- ── Deals Table ─────────────────── -->
  <div class="section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">All Deals</span>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="dealSearch" class="form-input" style="width:220px;padding:6px 10px;font-size:13px" placeholder="Search deals...">
          <button class="btn btn-primary" style="padding:6px 14px;font-size:13px" onclick="window.location.href='../deal-review/index.html'">+ New Deal</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="hub-table" id="dealsTable">
          <thead>
            <tr>
              <th>Account</th>
              <th>Stage</th>
              <th>Amount</th>
              <th>Close Date</th>
              <th>Forecast</th>
              <th>Next Step</th>
              <th>Days Left</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="dealsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script src="../assets/data.js"></script>
<script src="../assets/hub.js"></script>
<script>
requireAuth();

// ── Render Stat Tiles ─────────────────────
function renderStats() {
  const deals = PIPELINE_DEALS;
  const total = pipelineTotal();
  const weighted = weightedPipeline();
  const q = currentQuarter();
  const quota = HUB_CONFIG.fy26.quota;

  const commitArr = deals
    .filter(d => d.forecastCategory === 'Commit')
    .reduce((s, d) => s + d.amount, 0);

  const bestCaseArr = deals
    .filter(d => ['Commit', 'Best Case'].includes(d.forecastCategory))
    .reduce((s, d) => s + d.amount, 0);

  const closingSoon = deals.filter(d => {
    const days = daysUntil(d.closeDate);
    return days !== null && days <= 90 && days >= 0;
  }).length;

  const tiles = [
    { label: 'FY26 Quota', value: fmt$(quota), sub: 'Full year target', color: '' },
    { label: 'Open Pipeline', value: fmt$(total), sub: `${deals.length} deal${deals.length !== 1 ? 's' : ''}`, color: 'var(--accent-hover)' },
    { label: 'Commit', value: fmt$(commitArr), sub: 'Best case: ' + fmt$(bestCaseArr), color: 'var(--green)' },
    { label: 'Pipeline Coverage', value: total > 0 ? (total / (quota * 0.25)).toFixed(1) + 'x' : '0x', sub: `${quota * 0.25 > 0 ? '3x target' : ''}`, color: total / (quota * 0.25) >= 3 ? 'var(--green)' : 'var(--yellow)' },
    { label: 'Closes ≤90 days', value: closingSoon, sub: 'Deals closing soon', color: closingSoon > 0 ? 'var(--yellow)' : 'var(--text-muted)' },
    { label: 'Avg Deal Size', value: deals.length ? fmt$(Math.round(total / deals.length)) : '$0', sub: `Target: ${fmt$(HUB_CONFIG.fy26.avgDealSize)}`, color: '' },
  ];

  document.getElementById('statGrid').innerHTML = tiles.map(t => `
    <div class="stat-tile">
      <div class="label">${t.label}</div>
      <div class="value" style="color:${t.color || 'var(--text)'}">${t.value}</div>
      <div class="sub">${t.sub}</div>
    </div>
  `).join('');
}

// ── Render Forecast Card ──────────────────
function renderForecast() {
  const deals = PIPELINE_DEALS;
  const quota = HUB_CONFIG.fy26.quota;
  const q = currentQuarter();

  document.getElementById('quarterLabel').textContent = q.label;
  document.getElementById('ltcQuarter').textContent = q.label;

  const commitArr = deals.filter(d => d.forecastCategory === 'Commit').reduce((s, d) => s + d.amount, 0);
  const bestCaseArr = deals.filter(d => ['Commit', 'Best Case'].includes(d.forecastCategory)).reduce((s, d) => s + d.amount, 0);
  const commitPct = Math.min((commitArr / quota) * 100, 100);
  const bestPct = Math.min((bestCaseArr / quota) * 100, 100);

  document.getElementById('forecastContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;color:var(--text-muted)">
      <span>Closed Won: <strong style="color:var(--text)">$0</strong></span>
      <span>Quota: <strong style="color:var(--text)">${fmt$(quota)}</strong></span>
    </div>
    <div class="forecast-track" style="margin-bottom:20px;position:relative">
      <div class="forecast-fill forecast-best" style="width:${bestPct}%"></div>
      <div class="forecast-fill forecast-commit" style="width:${commitPct}%"></div>
      <div class="forecast-quota-mark" style="left:100%"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      ${[
        { label: 'Commit', val: commitArr, color: 'var(--green)' },
        { label: 'Best Case', val: bestCaseArr, color: 'var(--yellow)' },
        { label: 'Pipeline', val: deals.reduce((s,d)=>s+d.amount,0), color: 'var(--accent-hover)' },
      ].map(r => `
        <div style="text-align:center">
          <div style="font-size:20px;font-weight:700;color:${r.color}">${fmt$(r.val)}</div>
          <div style="font-size:11px;color:var(--text-dim)">${r.label}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Left to close
  const gap = Math.max(0, quota - 0); // quota - closed won
  const dealsNeeded = Math.ceil(gap / HUB_CONFIG.fy26.avgDealSize);

  document.getElementById('ltcContent').innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap">
      <div class="ltc-box" style="flex:1;min-width:120px">
        <div class="ltc-number">${fmt$(gap)}</div>
        <div class="ltc-label">ARR left to close FY26</div>
      </div>
      <div style="flex:1;min-width:120px">
        <div style="margin-bottom:14px">
          <div style="font-size:32px;font-weight:800;color:var(--yellow)">${dealsNeeded}</div>
          <div style="font-size:13px;color:var(--text-muted)">deals needed at avg ${fmt$(HUB_CONFIG.fy26.avgDealSize)}</div>
        </div>
        <div>
          <div style="font-size:24px;font-weight:800;color:var(--purple)">${HUB_CONFIG.fy26.dealsToClose}</div>
          <div style="font-size:13px;color:var(--text-muted)">total deals to close FY26</div>
        </div>
      </div>
    </div>
  `;
}

// ── Render Kanban ─────────────────────────
function renderKanban() {
  if (PIPELINE_DEALS.length === 0) {
    document.getElementById('pipelineTotalBadge').textContent = '0 deals';
    document.getElementById('kanbanBoard').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim)">
        <div style="font-size:32px;margin-bottom:12px">📭</div>
        <div style="font-size:15px;margin-bottom:8px">No deals in pipeline yet</div>
        <a href="../deal-review/index.html" class="btn btn-primary" style="display:inline-flex;margin-top:8px">+ Create your first deal room</a>
      </div>`;
    return;
  }

  const stages = ['Discovery', 'Demo', 'Evaluation', 'Negotiation', 'Closed Won'];
  const byStage = {};
  stages.forEach(s => byStage[s] = []);
  PIPELINE_DEALS.forEach(d => {
    if (byStage[d.stage]) byStage[d.stage].push(d);
  });

  const total = pipelineTotal();
  document.getElementById('pipelineTotalBadge').textContent = `${PIPELINE_DEALS.length} deals · ${fmt$(total)} total`;

  document.getElementById('kanbanBoard').innerHTML = stages.map(stage => {
    const deals = byStage[stage];
    const stageTotal = deals.reduce((s, d) => s + d.amount, 0);
    return `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-label" style="color:${stageColor(stage)}">${stage}</span>
          <span class="kanban-col-count">${deals.length}</span>
        </div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">${stageTotal > 0 ? fmt$(stageTotal) : '—'}</div>
        ${deals.length === 0
          ? `<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:16px 0">No deals</div>`
          : deals.map(d => `
            <div class="kanban-deal" onclick="window.location.href='../deal-review/index.html#${d.id}'">
              <div class="deal-name">${d.account}</div>
              <div class="deal-amount">${fmt$(d.amount)}</div>
              <div class="deal-close">Closes ${fmtDate(d.closeDate)}</div>
              <span class="badge deal-fc fc-${d.forecastCategory.replace(' ','').toLowerCase()}">${d.forecastCategory}</span>
            </div>
          `).join('')}
      </div>
    `;
  }).join('');
}

// ── Hot Deals ─────────────────────────────
function renderHotDeals() {
  const hot = PIPELINE_DEALS
    .filter(d => {
      const days = daysUntil(d.closeDate);
      return days !== null && days <= 90 && days >= 0;
    })
    .sort((a, b) => new Date(a.closeDate) - new Date(b.closeDate));

  const el = document.getElementById('hotDeals');
  if (hot.length === 0) {
    const msg = PIPELINE_DEALS.length === 0
      ? `<div class="empty-state"><div class="icon">🎯</div><p>Add deals in Deal Review to see them here</p></div>`
      : `<div class="empty-state"><div class="icon">🎯</div><p>No deals closing in the next 90 days</p></div>`;
    el.innerHTML = msg;
    return;
  }

  el.innerHTML = hot.map(d => {
    const days = daysUntil(d.closeDate);
    return `
      <div class="hot-deal-row" onclick="window.location.href='../deal-review/index.html#${d.id}'" style="cursor:pointer">
        <div class="hot-dot" style="background:${days <= 30 ? 'var(--red)' : days <= 60 ? 'var(--yellow)' : 'var(--green)'}"></div>
        <div style="flex:1">
          <div class="hot-deal-name">${d.account}</div>
          <div style="font-size:11px;color:var(--text-dim)">${d.stage} · ${d.nextStep ? d.nextStep.substring(0, 45) + (d.nextStep.length > 45 ? '…' : '') : 'No next step set'}</div>
        </div>
        <div style="text-align:right">
          <div class="hot-deal-amount">${fmt$(d.amount)}</div>
          <div class="hot-deal-close">${days}d left</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Territory Snapshot ────────────────────
function renderTerritory() {
  const accounts = TERRITORY_ACCOUNTS;
  const t1 = accounts.filter(a => a.tier === 'T1').length;
  const t2 = accounts.filter(a => a.tier === 'T2').length;
  const hot = accounts.filter(a => a.engagement_bucket === 'hot').length;
  const warm = accounts.filter(a => a.engagement_bucket === 'warm').length;
  const openDeals = PIPELINE_DEALS.filter(d => !['Closed Won','Closed Lost'].includes(d.stage)).length;

  document.getElementById('territorySnapshot').innerHTML = `
    <div class="territory-row">
      <div class="territory-label">Total T1/T2 Accounts</div>
      <div class="territory-value">${accounts.length.toLocaleString()}</div>
    </div>
    <div class="territory-row">
      <div class="territory-label">Tier 1 Accounts</div>
      <div class="territory-value" style="color:var(--red)">${t1}</div>
    </div>
    <div class="territory-row">
      <div class="territory-label">Tier 2 Accounts</div>
      <div class="territory-value" style="color:var(--yellow)">${t2}</div>
    </div>
    <div class="territory-row">
      <div class="territory-label">Hot / Warm Accounts</div>
      <div class="territory-value" style="color:var(--green)">${hot + warm}</div>
    </div>
    <div class="territory-row">
      <div class="territory-label">Open Pipeline Deals</div>
      <div class="territory-value" style="color:var(--accent-hover)">${openDeals}</div>
    </div>
  `;
}

// ── Deals Table ───────────────────────────
function renderDealsTable(filter = '') {
  const deals = PIPELINE_DEALS.filter(d =>
    !filter || d.account.toLowerCase().includes(filter) || d.name.toLowerCase().includes(filter)
  );

  document.getElementById('dealsTableBody').innerHTML = deals.length === 0
    ? `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-dim)">No deals found</td></tr>`
    : deals.map(d => {
        const days = daysUntil(d.closeDate);
        const daysText = days === null ? '—' : days < 0 ? `<span style="color:var(--red)">${Math.abs(days)}d overdue</span>` : `${days}d`;
        return `
          <tr onclick="window.location.href='../deal-review/index.html#${d.id}'" style="cursor:pointer">
            <td>
              <div style="font-weight:600">${d.account}</div>
              <div style="font-size:11px;color:var(--text-dim)">${d.type || 'New Business'}</div>
            </td>
            <td><span style="color:${stageColor(d.stage)};font-weight:600">${d.stage}</span></td>
            <td style="color:var(--green);font-weight:700">${fmt$(d.amount)}</td>
            <td>${fmtDate(d.closeDate)}</td>
            <td><span class="badge fc-${(d.forecastCategory || '').replace(' ','').toLowerCase()}">${d.forecastCategory || '—'}</span></td>
            <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;color:var(--text-muted)">${d.nextStep || '—'}</td>
            <td>${daysText}</td>
            <td>
              <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="event.stopPropagation();openSF(d.sfUrl)">SF ↗</button>
            </td>
          </tr>
        `;
      }).join('');
}

// ── Search ────────────────────────────────
document.getElementById('dealSearch').addEventListener('input', e => {
  renderDealsTable(e.target.value.toLowerCase().trim());
});

// ── Init ──────────────────────────────────
renderStats();
renderForecast();
renderKanban();
renderHotDeals();
renderTerritory();
renderDealsTable();
</script>
</body>
</html>
